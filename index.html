<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finger Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      cursor: none;
    }

    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }

    video {
      display: none;
    }

    #loading {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      color: #fff;
      transition: opacity 0.5s;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #a855f7;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loading p {
      font-size: 14px;
      opacity: 0.6;
    }

    #world-label {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 10;
      transition: opacity 0.3s;
    }

    #hint {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      letter-spacing: 1px;
      pointer-events: none;
      z-index: 10;
      transition: opacity 0.5s;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loader"></div>
    <p>Initializing hand tracking...</p>
  </div>
  <canvas id="canvas"></canvas>
  <video id="video" playsinline></video>
  <div id="world-label">GALAXY</div>
  <div id="hint">Make a circle with thumb & index finger to open portal</div>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.min.js"></script>

  <script>
    // ─── Config ───────────────────────────────────────────
    const CIRCLE_THRESHOLD = 0.09;  // max normalized distance to detect "circle" gesture
    const MIN_PORTAL_RADIUS = 20;
    const MAX_PORTAL_RADIUS = 300;
    const PORTAL_OPEN_SPEED = 0.12;
    const PORTAL_CLOSE_SPEED = 0.08;
    const PARTICLE_COUNT = 15;
    const STAR_COUNT = 400;
    const LEAK_PARTICLE_COUNT = 12;

    // ─── State ────────────────────────────────────────────
    const state = {
      portalActive: false,
      portalCenter: { x: 0, y: 0 },
      portalTargetRadius: 0,
      portalCurrentRadius: 0,
      portalOpacity: 0,
      handTilt: { x: 0, y: 0 },
      currentWorld: 0,
      worldNames: ['GALAXY', 'FIRE', 'UNDERWATER', 'FOREST', 'CYBERPUNK'],
      worldColors: ['#a855f7', '#f97316', '#06b6d4', '#22c55e', '#ec4899'],
      otherHandInPortal: false,
      otherHandFingers: [],
      justClosed: false,
      burstParticles: [],
      peaceSignCooldown: 0,
      lastFrameTime: 0,
    };

    // ─── World Particles ──────────────────────────────────
    // Galaxy
    const stars = Array.from({ length: STAR_COUNT }, () => ({
      x: Math.random() * 2 - 1,
      y: Math.random() * 2 - 1,
      size: Math.random() * 2.5 + 0.3,
      brightness: Math.random(),
      speed: Math.random() * 0.0003 + 0.0001,
      angle: Math.random() * Math.PI * 2,
      dist: Math.random(),
    }));

    const nebulaClouds = Array.from({ length: 8 }, () => ({
      x: Math.random() * 2 - 1,
      y: Math.random() * 2 - 1,
      radius: Math.random() * 0.4 + 0.2,
      color: ['#7c3aed', '#a855f7', '#3b82f6', '#6366f1', '#8b5cf6'][Math.floor(Math.random() * 5)],
      opacity: Math.random() * 0.15 + 0.05,
    }));

    // Fire
    const fireParticles = Array.from({ length: 200 }, () => createFireParticle());
    function createFireParticle() {
      return {
        x: Math.random() * 2 - 1,
        y: Math.random() * 2 - 1,
        vy: -(Math.random() * 0.015 + 0.005),
        vx: (Math.random() - 0.5) * 0.004,
        size: Math.random() * 6 + 2,
        life: Math.random(),
        maxLife: Math.random() * 0.6 + 0.4,
      };
    }

    // Underwater
    const bubbles = Array.from({ length: 80 }, () => createBubble());
    function createBubble() {
      return {
        x: Math.random() * 2 - 1,
        y: Math.random() * 2 - 1,
        vy: -(Math.random() * 0.005 + 0.002),
        vx: Math.sin(Math.random() * Math.PI * 2) * 0.001,
        size: Math.random() * 5 + 1,
        wobbleOffset: Math.random() * Math.PI * 2,
        opacity: Math.random() * 0.5 + 0.2,
      };
    }

    const causticLines = Array.from({ length: 15 }, () => ({
      x: Math.random() * 2 - 1,
      y: Math.random() * 2 - 1,
      angle: Math.random() * Math.PI,
      length: Math.random() * 0.5 + 0.2,
      speed: Math.random() * 0.002 + 0.001,
      opacity: Math.random() * 0.1 + 0.03,
    }));

    // Forest
    const leaves = Array.from({ length: 60 }, () => createLeaf());
    function createLeaf() {
      return {
        x: Math.random() * 2 - 1,
        y: Math.random() * 2 - 1,
        vy: Math.random() * 0.004 + 0.001,
        vx: Math.sin(Math.random() * Math.PI * 2) * 0.002,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.03,
        size: Math.random() * 6 + 3,
        color: ['#22c55e', '#16a34a', '#4ade80', '#86efac', '#a3e635'][Math.floor(Math.random() * 5)],
      };
    }

    const lightRays = Array.from({ length: 6 }, () => ({
      x: Math.random() * 2 - 1,
      angle: -Math.PI / 4 + Math.random() * 0.3,
      width: Math.random() * 0.15 + 0.05,
      opacity: Math.random() * 0.08 + 0.02,
      speed: Math.random() * 0.0005 + 0.0002,
    }));

    // Cyberpunk
    const cyberParticles = Array.from({ length: 100 }, () => ({
      x: Math.random() * 2 - 1,
      y: Math.random() * 2 - 1,
      vy: Math.random() * 0.01 + 0.003,
      size: Math.random() * 3 + 1,
      color: ['#ec4899', '#a855f7', '#06b6d4', '#f472b6'][Math.floor(Math.random() * 4)],
      opacity: Math.random() * 0.8 + 0.2,
    }));

    const gridLines = Array.from({ length: 20 }, (_, i) => ({
      pos: (i / 20) * 2 - 1,
      opacity: 0.15,
    }));

    // Leaking particles (escape from portal edge)
    const leakParticles = Array.from({ length: LEAK_PARTICLE_COUNT }, () => createLeakParticle(0, 0, 0));
    function createLeakParticle(cx, cy, radius) {
      const angle = Math.random() * Math.PI * 2;
      return {
        x: cx + Math.cos(angle) * radius,
        y: cy + Math.sin(angle) * radius,
        vx: Math.cos(angle) * (Math.random() * 1.5 + 0.5),
        vy: Math.sin(angle) * (Math.random() * 1.5 + 0.5),
        life: Math.random(),
        maxLife: Math.random() * 0.5 + 0.5,
        size: Math.random() * 3 + 1,
        angle,
      };
    }

    // ─── Canvas Setup ─────────────────────────────────────
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('video');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // ─── MediaPipe Setup ──────────────────────────────────
    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`,
    });

    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.6,
    });

    hands.onResults(onHandResults);

    // ─── Camera ───────────────────────────────────────────
    async function startCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: 1280, height: 720 }
      });
      video.srcObject = stream;
      await video.play();

      const camera = new Camera(video, {
        onFrame: async () => {
          await hands.send({ image: video });
        },
        width: 1280,
        height: 720,
      });
      camera.start();

      setTimeout(() => {
        document.getElementById('loading').classList.add('hidden');
      }, 1500);

      // Hide hint after 6 seconds
      setTimeout(() => {
        document.getElementById('hint').style.opacity = '0';
      }, 6000);
    }

    startCamera();

    // ─── Hand Processing ──────────────────────────────────
    function onHandResults(results) {
      const W = canvas.width;
      const H = canvas.height;

      // Reset
      state.portalActive = false;
      state.otherHandInPortal = false;
      state.otherHandFingers = [];

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        for (let h = 0; h < results.multiHandLandmarks.length; h++) {
          const lm = results.multiHandLandmarks[h];

          const thumbTip = lm[4];
          const indexTip = lm[8];
          const wrist = lm[0];
          const middleBase = lm[9];

          // Distance between thumb and index (normalized)
          const dx = thumbTip.x - indexTip.x;
          const dy = thumbTip.y - indexTip.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < CIRCLE_THRESHOLD && !state.portalActive) {
            // Circle detected!
            state.portalActive = true;

            // Portal center = midpoint (mirrored for selfie view)
            state.portalCenter.x = (1 - (thumbTip.x + indexTip.x) / 2) * W;
            state.portalCenter.y = ((thumbTip.y + indexTip.y) / 2) * H;

            // Portal radius scales with hand size (distance from wrist to middle finger base)
            const handSize = Math.sqrt(
              Math.pow(wrist.x - middleBase.x, 2) + Math.pow(wrist.y - middleBase.y, 2)
            );
            state.portalTargetRadius = Math.min(MAX_PORTAL_RADIUS, Math.max(MIN_PORTAL_RADIUS, handSize * W * 0.8));

            // Hand tilt for parallax
            const tiltX = (middleBase.x - wrist.x);
            const tiltY = (middleBase.y - wrist.y);
            state.handTilt.x = tiltX * 200;
            state.handTilt.y = tiltY * 200;
          }

          // Check if OTHER hand's fingers are inside portal
          if (state.portalActive && h > 0) {
            const fingers = [lm[4], lm[8], lm[12], lm[16], lm[20]];
            for (const f of fingers) {
              const fx = (1 - f.x) * W;
              const fy = f.y * H;
              const fdx = fx - state.portalCenter.x;
              const fdy = fy - state.portalCenter.y;
              if (Math.sqrt(fdx * fdx + fdy * fdy) < state.portalCurrentRadius) {
                state.otherHandInPortal = true;
                state.otherHandFingers.push({ x: fx, y: fy });
              }
            }
          }

          // Peace sign detection for world switching (index + middle up, others down)
          if (state.peaceSignCooldown <= 0) {
            const indexUp = lm[8].y < lm[6].y;
            const middleUp = lm[12].y < lm[10].y;
            const ringDown = lm[16].y > lm[14].y;
            const pinkyDown = lm[20].y > lm[18].y;
            const thumbIn = Math.abs(lm[4].x - lm[3].x) < 0.04;

            if (indexUp && middleUp && ringDown && pinkyDown && thumbIn) {
              state.currentWorld = (state.currentWorld + 1) % state.worldNames.length;
              document.getElementById('world-label').textContent = state.worldNames[state.currentWorld];
              state.peaceSignCooldown = 60; // ~1 second cooldown
            }
          }
        }
      }

      if (state.peaceSignCooldown > 0) state.peaceSignCooldown--;
    }

    // ─── Render Loop ──────────────────────────────────────
    let time = 0;

    function render() {
      requestAnimationFrame(render);
      const now = performance.now();
      const dt = Math.min((now - (state.lastFrameTime || now)) / 16.67, 3); // normalize to ~60fps
      state.lastFrameTime = now;
      time += 0.016 * dt;

      const W = canvas.width;
      const H = canvas.height;

      ctx.clearRect(0, 0, W, H);

      // ── Draw camera feed (mirrored) ──
      ctx.save();
      ctx.translate(W, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, W, H);
      ctx.restore();

      // ── Smooth portal radius ──
      if (state.portalActive) {
        state.portalCurrentRadius += (state.portalTargetRadius - state.portalCurrentRadius) * PORTAL_OPEN_SPEED * dt;
        state.portalOpacity = Math.min(1, state.portalOpacity + 0.06 * dt);
      } else {
        state.portalCurrentRadius *= (1 - PORTAL_CLOSE_SPEED * dt);
        state.portalOpacity = Math.max(0, state.portalOpacity - 0.04 * dt);

        if (state.portalCurrentRadius > 5 && !state.justClosed) {
          // Spawn burst particles on close
          state.justClosed = true;
          for (let i = 0; i < 20; i++) {
            const angle = Math.random() * Math.PI * 2;
            state.burstParticles.push({
              x: state.portalCenter.x,
              y: state.portalCenter.y,
              vx: Math.cos(angle) * (Math.random() * 4 + 2),
              vy: Math.sin(angle) * (Math.random() * 4 + 2),
              life: 1,
              size: Math.random() * 4 + 1,
              color: state.worldColors[state.currentWorld],
            });
          }
        }

        if (state.portalCurrentRadius < 2) {
          state.portalCurrentRadius = 0;
          state.justClosed = false;
        }
      }

      const r = state.portalCurrentRadius;
      const cx = state.portalCenter.x;
      const cy = state.portalCenter.y;

      if (r > 3 && state.portalOpacity > 0.01) {
        // ── Draw portal world inside clip ──
        ctx.save();
        ctx.globalAlpha = state.portalOpacity;

        // Circular clip
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.clip();

        // Draw current world
        drawWorld(ctx, cx, cy, r, time, dt);

        // ── Reach-in distortion ──
        if (state.otherHandInPortal) {
          ctx.fillStyle = 'rgba(0,0,0,0.35)';
          for (const f of state.otherHandFingers) {
            const grad = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, 30);
            grad.addColorStop(0, 'rgba(255,255,255,0.25)');
            grad.addColorStop(1, 'rgba(0,0,0,0.4)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(f.x, f.y, 30, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        ctx.restore();

        // ── Edge glow ──
        const glowColor = state.worldColors[state.currentWorld];
        const pulseIntensity = 0.5 + Math.sin(time * 3) * 0.2;

        for (let i = 3; i >= 1; i--) {
          ctx.beginPath();
          ctx.arc(cx, cy, r + i * 6, 0, Math.PI * 2);
          ctx.strokeStyle = glowColor;
          ctx.globalAlpha = pulseIntensity * (0.3 / i) * state.portalOpacity;
          ctx.lineWidth = 4;
          ctx.stroke();
        }

        // Inner bright rim
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.strokeStyle = '#fff';
        ctx.globalAlpha = 0.4 * state.portalOpacity;
        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.globalAlpha = 1;

        // ── Leaking particles ──
        if (state.portalActive) {
          drawLeakParticles(ctx, cx, cy, r, dt);
        }
      }

      // ── Burst particles (on close) ──
      for (let i = state.burstParticles.length - 1; i >= 0; i--) {
        const p = state.burstParticles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= 0.025 * dt;
        if (p.life <= 0) {
          state.burstParticles.splice(i, 1);
          continue;
        }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life * 0.8;
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      // ── World label glow ──
      const label = document.getElementById('world-label');
      label.style.color = state.worldColors[state.currentWorld];
      label.style.opacity = state.portalCurrentRadius > 5 ? '0.8' : '0.3';
    }

    // ─── Draw World Functions ─────────────────────────────
    function drawWorld(ctx, cx, cy, r, time, dt) {
      const px = state.handTilt.x;
      const py = state.handTilt.y;

      switch (state.currentWorld) {
        case 0: drawGalaxy(ctx, cx, cy, r, time, px, py); break;
        case 1: drawFire(ctx, cx, cy, r, time, dt, px, py); break;
        case 2: drawUnderwater(ctx, cx, cy, r, time, dt, px, py); break;
        case 3: drawForest(ctx, cx, cy, r, time, dt, px, py); break;
        case 4: drawCyberpunk(ctx, cx, cy, r, time, dt, px, py); break;
      }
    }

    // ── Galaxy ──
    function drawGalaxy(ctx, cx, cy, r, time, px, py) {
      // Background
      const bg = ctx.createRadialGradient(cx + px * 0.3, cy + py * 0.3, 0, cx, cy, r);
      bg.addColorStop(0, '#0a0015');
      bg.addColorStop(0.5, '#0f0030');
      bg.addColorStop(1, '#000010');
      ctx.fillStyle = bg;
      ctx.fillRect(cx - r, cy - r, r * 2, r * 2);

      // Nebula clouds
      for (const cloud of nebulaClouds) {
        const nx = cx + cloud.x * r * 0.7 + px * 0.2;
        const ny = cy + cloud.y * r * 0.7 + py * 0.2;
        const nr = cloud.radius * r;
        const grad = ctx.createRadialGradient(nx, ny, 0, nx, ny, nr);
        grad.addColorStop(0, cloud.color + '40');
        grad.addColorStop(0.5, cloud.color + '15');
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.fillRect(nx - nr, ny - nr, nr * 2, nr * 2);
      }

      // Stars with rotation
      for (const star of stars) {
        star.angle += star.speed;
        const sx = cx + Math.cos(star.angle) * star.dist * r * 0.9 + px * 0.15;
        const sy = cy + Math.sin(star.angle) * star.dist * r * 0.9 + py * 0.15;
        const twinkle = 0.5 + Math.sin(time * 5 + star.brightness * 100) * 0.5;
        ctx.beginPath();
        ctx.arc(sx, sy, star.size * twinkle, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${star.brightness * twinkle})`;
        ctx.fill();
      }

      // Shooting star occasionally
      if (Math.sin(time * 0.7) > 0.98) {
        const sx = cx + Math.cos(time * 3) * r * 0.5;
        const sy = cy + Math.sin(time * 2) * r * 0.3;
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(sx - 30, sy + 15);
        ctx.strokeStyle = 'rgba(255,255,255,0.8)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
    }

    // ── Fire ──
    function drawFire(ctx, cx, cy, r, time, dt, px, py) {
      // Background — dark red/orange
      const bg = ctx.createRadialGradient(cx + px * 0.2, cy + r * 0.3 + py * 0.2, 0, cx, cy, r);
      bg.addColorStop(0, '#1a0500');
      bg.addColorStop(0.6, '#2d0a00');
      bg.addColorStop(1, '#0a0000');
      ctx.fillStyle = bg;
      ctx.fillRect(cx - r, cy - r, r * 2, r * 2);

      // Lava base glow
      const lavaGrad = ctx.createLinearGradient(cx, cy + r * 0.5, cx, cy + r);
      lavaGrad.addColorStop(0, 'transparent');
      lavaGrad.addColorStop(0.5, 'rgba(255, 80, 0, 0.3)');
      lavaGrad.addColorStop(1, 'rgba(255, 40, 0, 0.5)');
      ctx.fillStyle = lavaGrad;
      ctx.fillRect(cx - r, cy - r, r * 2, r * 2);

      // Fire particles
      for (const p of fireParticles) {
        p.y += p.vy * dt;
        p.x += p.vx * dt + Math.sin(time * 5 + p.life * 10) * 0.002;
        p.life -= 0.008 * dt;

        if (p.life <= 0 || p.y < -1) {
          Object.assign(p, createFireParticle());
          p.y = 1 + Math.random() * 0.3;
          p.x = (Math.random() * 2 - 1) * 0.8;
          p.life = p.maxLife;
        }

        const fx = cx + p.x * r * 0.8 + px * 0.15;
        const fy = cy + p.y * r * 0.7 + py * 0.15;
        const lifeRatio = p.life / p.maxLife;

        // Color: white core → yellow → orange → red
        let color;
        if (lifeRatio > 0.8) color = `rgba(255, 255, 200, ${lifeRatio})`;
        else if (lifeRatio > 0.5) color = `rgba(255, 180, 30, ${lifeRatio})`;
        else if (lifeRatio > 0.2) color = `rgba(255, 80, 0, ${lifeRatio})`;
        else color = `rgba(180, 20, 0, ${lifeRatio})`;

        ctx.beginPath();
        ctx.arc(fx, fy, p.size * lifeRatio, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
      }
    }

    // ── Underwater ──
    function drawUnderwater(ctx, cx, cy, r, time, dt, px, py) {
      // Background — deep blue-green gradient
      const bg = ctx.createLinearGradient(cx, cy - r, cx, cy + r);
      bg.addColorStop(0, '#001a2e');
      bg.addColorStop(0.5, '#003344');
      bg.addColorStop(1, '#001520');
      ctx.fillStyle = bg;
      ctx.fillRect(cx - r, cy - r, r * 2, r * 2);

      // Caustic light effect
      for (const c of causticLines) {
        c.x += Math.sin(time + c.opacity * 100) * c.speed;
        const lx = cx + c.x * r * 0.6 + px * 0.2;
        const ly = cy + c.y * r * 0.6 + py * 0.2;

        ctx.save();
        ctx.translate(lx, ly);
        ctx.rotate(c.angle + Math.sin(time * 0.5) * 0.3);
        ctx.fillStyle = `rgba(100, 220, 255, ${c.opacity + Math.sin(time * 2 + c.x * 5) * 0.03})`;
        ctx.fillRect(-c.length * r * 0.3, -1, c.length * r * 0.6, 2);
        ctx.restore();
      }

      // Bubbles
      for (const b of bubbles) {
        b.y += b.vy * dt;
        b.x += Math.sin(time * 2 + b.wobbleOffset) * 0.002 * dt;

        if (b.y < -1.2) {
          Object.assign(b, createBubble());
          b.y = 1.2;
        }

        const bx = cx + b.x * r * 0.8 + px * 0.1;
        const by = cy + b.y * r * 0.8 + py * 0.1;

        ctx.beginPath();
        ctx.arc(bx, by, b.size, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(150, 230, 255, ${b.opacity})`;
        ctx.lineWidth = 0.8;
        ctx.stroke();

        // Highlight
        ctx.beginPath();
        ctx.arc(bx - b.size * 0.3, by - b.size * 0.3, b.size * 0.3, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${b.opacity * 0.5})`;
        ctx.fill();
      }
    }

    // ── Forest ──
    function drawForest(ctx, cx, cy, r, time, dt, px, py) {
      // Background — deep green
      const bg = ctx.createRadialGradient(cx + px * 0.2, cy - r * 0.3 + py * 0.2, 0, cx, cy, r);
      bg.addColorStop(0, '#0a1f0a');
      bg.addColorStop(0.5, '#0d2e0d');
      bg.addColorStop(1, '#061006');
      ctx.fillStyle = bg;
      ctx.fillRect(cx - r, cy - r, r * 2, r * 2);

      // Light rays from top
      for (const ray of lightRays) {
        ray.x += Math.sin(time * 0.3 + ray.opacity * 50) * ray.speed;
        const rx = cx + ray.x * r * 0.5 + px * 0.1;
        const ry = cy - r;
        const rayLen = r * 2.5;

        ctx.save();
        ctx.translate(rx, ry);
        ctx.rotate(ray.angle);
        const grad = ctx.createLinearGradient(0, 0, 0, rayLen);
        grad.addColorStop(0, `rgba(200, 255, 150, ${ray.opacity + Math.sin(time + ray.x * 3) * 0.02})`);
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.fillRect(-ray.width * r, 0, ray.width * r * 2, rayLen);
        ctx.restore();
      }

      // Falling leaves
      for (const leaf of leaves) {
        leaf.y += leaf.vy * dt;
        leaf.x += leaf.vx * dt + Math.sin(time * 1.5 + leaf.rotation) * 0.001;
        leaf.rotation += leaf.rotSpeed * dt;

        if (leaf.y > 1.3) {
          Object.assign(leaf, createLeaf());
          leaf.y = -1.3;
        }

        const lx = cx + leaf.x * r * 0.8 + px * 0.15;
        const ly = cy + leaf.y * r * 0.8 + py * 0.15;

        ctx.save();
        ctx.translate(lx, ly);
        ctx.rotate(leaf.rotation);
        ctx.fillStyle = leaf.color;
        ctx.globalAlpha = 0.7;
        // Leaf shape
        ctx.beginPath();
        ctx.ellipse(0, 0, leaf.size, leaf.size * 0.4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.restore();
      }
    }

    // ── Cyberpunk ──
    function drawCyberpunk(ctx, cx, cy, r, time, dt, px, py) {
      // Background — dark purple
      ctx.fillStyle = '#05000a';
      ctx.fillRect(cx - r, cy - r, r * 2, r * 2);

      // Neon grid — horizontal lines with perspective
      for (let i = 0; i < 20; i++) {
        const yRatio = i / 20;
        const lineY = cy + (yRatio * 2 - 1) * r + Math.sin(time * 0.5) * 5 + py * 0.15;
        const opacity = 0.15 + Math.sin(time + i * 0.5) * 0.05;

        ctx.beginPath();
        ctx.moveTo(cx - r, lineY);
        ctx.lineTo(cx + r, lineY);
        ctx.strokeStyle = `rgba(168, 85, 247, ${opacity})`;
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }

      // Vertical grid lines
      for (let i = 0; i < 15; i++) {
        const xRatio = i / 15;
        const lineX = cx + (xRatio * 2 - 1) * r + px * 0.15;
        const opacity = 0.1 + Math.sin(time * 0.7 + i) * 0.04;

        ctx.beginPath();
        ctx.moveTo(lineX, cy - r);
        ctx.lineTo(lineX, cy + r);
        ctx.strokeStyle = `rgba(236, 72, 153, ${opacity})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }

      // Digital rain particles
      for (const p of cyberParticles) {
        p.y += p.vy * dt;
        if (p.y > 1.2) {
          p.y = -1.2;
          p.x = Math.random() * 2 - 1;
        }

        const px2 = cx + p.x * r * 0.9 + px * 0.1;
        const py2 = cy + p.y * r * 0.9 + py * 0.1;

        ctx.beginPath();
        ctx.arc(px2, py2, p.size, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.opacity * (0.7 + Math.sin(time * 8 + p.x * 20) * 0.3);
        ctx.fill();

        // Trail
        ctx.beginPath();
        ctx.moveTo(px2, py2);
        ctx.lineTo(px2, py2 - p.size * 4);
        ctx.strokeStyle = p.color;
        ctx.globalAlpha = p.opacity * 0.3;
        ctx.lineWidth = p.size * 0.5;
        ctx.stroke();
      }

      ctx.globalAlpha = 1;

      // Center glow pulse
      const glowR = r * 0.4;
      const pulseGrad = ctx.createRadialGradient(cx + px * 0.1, cy + py * 0.1, 0, cx, cy, glowR);
      const pulse = 0.1 + Math.sin(time * 2) * 0.05;
      pulseGrad.addColorStop(0, `rgba(168, 85, 247, ${pulse})`);
      pulseGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = pulseGrad;
      ctx.fillRect(cx - glowR, cy - glowR, glowR * 2, glowR * 2);
    }

    // ─── Leak Particles ───────────────────────────────────
    function drawLeakParticles(ctx, cx, cy, r, dt) {
      const color = state.worldColors[state.currentWorld];

      for (const p of leakParticles) {
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= 0.015 * dt;

        if (p.life <= 0) {
          // Reset at portal edge
          const angle = Math.random() * Math.PI * 2;
          p.x = cx + Math.cos(angle) * r;
          p.y = cy + Math.sin(angle) * r;
          p.vx = Math.cos(angle) * (Math.random() * 1.5 + 0.5);
          p.vy = Math.sin(angle) * (Math.random() * 1.5 + 0.5);
          p.life = 1;
          p.size = Math.random() * 3 + 1;
        }

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.globalAlpha = p.life * 0.6;
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // ─── Start Render Loop ────────────────────────────────
    render();
  </script>
</body>
